services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: hla_xapi
      POSTGRES_USER: hla_xapi
      POSTGRES_PASSWORD: hla_xapi_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hla_xapi -d hla_xapi"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
